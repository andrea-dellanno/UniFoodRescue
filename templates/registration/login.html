{% extends 'base.html' %}
{% block title %}Accesso · UniFood Rescue{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h1 class="h4 mb-3">Accesso</h1>
        <form method="post" novalidate>
          {% csrf_token %}
          {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Username</label>
            <input class="form-control" type="text" name="username" id="id_username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">Password</label>
            <input class="form-control" type="password" name="password" id="id_password" required>
          </div>
          <button class="btn btn-success w-100">Entra</button>
        </form>
        <p class="small text-muted mt-3 mb-0">Non hai un account? <a href="{% url 'registrazione' %}">Registrati come studente</a>.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
