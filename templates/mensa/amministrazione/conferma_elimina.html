{% extends 'base.html' %}
{% block title %}{{ title }} · UniFood Rescue{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">{{ title }}</h1>

        <p class="mb-1">Stai per eliminare:</p>
        <p class="fw-semibold mb-4">{{ object }}</p>

        <div class="alert alert-warning mb-4">
          L'eliminazione è consentita solo se l'elemento non è collegato ad altri dati del sistema.
        </div>

        <form method="post" class="d-flex gap-2">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Elimina</button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary">Annulla</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
